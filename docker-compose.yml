version: '3.8'

services:
  # PostgreSQL local
  postgres:
    image: postgres:15-alpine
    container_name: finaflow-postgres-local
    environment:
      POSTGRES_USER: finaflow_user
      POSTGRES_PASSWORD: Finaflow123!
      POSTGRES_DB: finaflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finaflow_user -d finaflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - finaflow-network

  # Backend FastAPI
  backend:
    build: ./backend
    container_name: finaflow-backend-local
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql://finaflow_user:Finaflow123!@postgres:5432/finaflow"
      SECRET_KEY: "dev-secret-key-finaflow-local-2024"
      JWT_SECRET: "dev-secret-key-finaflow-local-2024"
      JWT_ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
      PROJECT_ID: "local-dev"
      ENVIRONMENT: "development"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:8000"
      ALLOWED_HOSTS: "*"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "
        echo 'Aguardando DB...';
        sleep 5;
        echo 'Rodando alembic upgrade...';
        alembic upgrade head || echo 'Alembic failed or migrations not found';
        echo 'Iniciando uvicorn...';
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    networks:
      - finaflow-network

  # Frontend Next.js
  frontend:
    image: node:18-bullseye
    container_name: finaflow-frontend-local
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
      NEXT_PUBLIC_ENVIRONMENT: "development"
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/.next
      - /app/node_modules
    depends_on:
      - backend
    command: sh -c "npm install --silent && npm run dev"
    networks:
      - finaflow-network

volumes:
  postgres_data:
    driver: local

networks:
  finaflow-network:
    driver: bridge
