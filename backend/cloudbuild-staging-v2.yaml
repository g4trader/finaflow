options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

steps:
  # 1. Build da imagem
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/finaflow-backend-staging', '-f', 'backend/Dockerfile', 'backend']

  # 2. Push da imagem
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args: ['push', 'gcr.io/$PROJECT_ID/finaflow-backend-staging']

  # 3. Executar seed dentro do container (usa Cloud SQL via TCP com IP público)
  # Nota: Cloud Build não tem acesso direto ao Unix socket, então usamos IP público
  - name: 'gcr.io/cloud-builders/docker'
    id: 'run-seed'
    entrypoint: 'docker'
    args:
      - 'run'
      - '--rm'
      - '-v'
      - '/workspace/backend:/workspace/backend:ro'
      - '-w'
      - '/workspace/backend'
      - '-e'
      - 'DATABASE_URL=postgresql://finaflow_user:Finaflow123!@34.41.169.224:5432/finaflow'
      - '-e'
      - 'PYTHONPATH=/workspace/backend'
      - 'gcr.io/$PROJECT_ID/finaflow-backend-staging'
      - 'python'
      - '-m'
      - 'scripts.seed_from_client_sheet'
      - '--file'
      - 'data/fluxo_caixa_2025.xlsx'
    waitFor: ['push-image']

  # 4. Executar validação dentro do container
  - name: 'gcr.io/cloud-builders/docker'
    id: 'run-validation'
    entrypoint: 'docker'
    args:
      - 'run'
      - '--rm'
      - '-v'
      - '/workspace/backend:/workspace/backend:ro'
      - '-w'
      - '/workspace/backend'
      - '-e'
      - 'DATABASE_URL=postgresql://finaflow_user:Finaflow123!@34.41.169.224:5432/finaflow'
      - '-e'
      - 'BACKEND_URL=https://finaflow-backend-staging-642830139828.us-central1.run.app'
      - '-e'
      - 'PYTHONPATH=/workspace/backend'
      - 'gcr.io/$PROJECT_ID/finaflow-backend-staging'
      - 'python'
      - '-m'
      - 'scripts.validate_dashboard_against_client_sheet'
      - '--file'
      - 'data/fluxo_caixa_2025.xlsx'
      - '--year'
      - '2025'
      - '--backend-url'
      - 'https://finaflow-backend-staging-642830139828.us-central1.run.app'
    waitFor: ['run-seed']

  # 4. Deploy do serviço (só executa se seed + validação passarem)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-service'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'finaflow-backend-staging'
      - '--image'
      - 'gcr.io/$PROJECT_ID/finaflow-backend-staging'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances'
      - 'trivihair:us-central1:finaflow-db-staging'
      - '--set-env-vars'
      - 'DATABASE_URL=postgresql://finaflow_user:Finaflow123!@/finaflow?host=/cloudsql/trivihair:us-central1:finaflow-db-staging,SECRET_KEY=finaflow-secret-key-2024-staging,JWT_SECRET=finaflow-secret-key-2024-staging,CORS_ORIGINS=*,ALLOWED_HOSTS=*,PROJECT_ID=trivihair,ENVIRONMENT=staging'
      - '--port'
      - '8080'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '600'
      - '--concurrency'
      - '80'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '10'
      - '--cpu-boost'
    waitFor: ['run-validation']

images:
  - 'gcr.io/$PROJECT_ID/finaflow-backend-staging'

timeout: '3600s'

